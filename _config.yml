# Theme Settings
minimal_mistakes_skin    : "air" # "default", "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Site Settings
locale                   : "en-US"
title                    : "Myeongsoo Kim"
title_separator          : "-"
subtitle                 : "Ph.D. Student @ POSTECH"
name                     : "Myeongsoo Kim"
description              : "Ph.D. Student in Industrial & Management Engineering at POSTECH. Research on Reliability of Generative AI."
url                      : "https://Kim-Myeong-Soo.github.io"
baseurl                  : ""
repository               : "Kim-Myeong-Soo/Kim-Myeong-Soo.github.io"
teaser                   :
logo                     :
masthead_title           : " "
words_per_minute         : 200
comments:
  provider               :
atom_feed:
  path                   :
  hide                   :
search                   : false

# SEO Related
google_site_verification :
bing_site_verification   :

# Social Sharing
og_image                 :
social:
  type                   : "Person"
  name                   : "Myeongsoo Kim"
  links: []

# Analytics
analytics:
  provider               : false


# Site Author
author:
  name             : "Myeongsoo Kim"
  avatar           : "/assets/images/bio-photo.jpg"
  bio              : "Ph.D. Student in Industrial & Management Engineering at POSTECH."
  location         : "Pohang, South Korea"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:kims71@postech.ac.kr"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Kim-Myeong-Soo"
    - label: "Hugging Face"
      icon: "fas fa-fw fa-smile"
      url: "https://huggingface.co/thingsu"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Kim-Myeong-Soo"


# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs
  - /test
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false


# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed


# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: "Asia/Seoul"


# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache


# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/


# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development


# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
